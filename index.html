<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Te Amo ❤️</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#ff4b7d,#ff8fab);
    overflow:hidden;
}

.tela{
    width:100%;
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    color:white;
    text-align:center;
}

button{
    padding:15px 30px;
    font-size:20px;
    border:none;
    border-radius:30px;
    cursor:pointer;
}

#tela2{
    display:none;
    padding:20px;
}

.heart{
    position:absolute;
    font-size:25px;
    animation:cair 6s linear infinite;
}

@keyframes cair{
    from{transform:translateY(-100px);}
    to{transform:translateY(110vh);}
}
</style>
</head>
<body>

<div id="tela1" class="tela">
    <h1>❤️ Eu tenho uma pergunta... ❤️</h1>
    <p>Você também me ama? 🥺</p>

    <button onclick="abrirCarta()">Sim ❤️</button>
    <button id="nao">Não 😅</button>
</div>
    
    


<div id="tela2" class="tela">
    <h1>💌 Uma mensagem para você</h1>

    <p style="max-width:600px;font-size:22px;">
        Desde que você entrou na minha vida,
        tudo ficou mais bonito.
        Seu sorriso ilumina meus dias e eu sou muito feliz por ter você.
        Eu te amo hoje, amanhã e sempre. ❤️
    </p>
</div>

<script>
function abrirCarta(){
    document.getElementById("tela1").style.display="none";
    document.getElementById("tela2").style.display="flex";
}

setInterval(()=>{
    let h=document.createElement("div");
    h.className="heart";
    h.innerHTML="❤️";
    h.style.left=Math.random()*100+"vw";
    h.style.fontSize=(20+Math.random()*20)+"px";
    h.style.animationDuration=(3+Math.random()*3)+"s";
    document.body.appendChild(h);

    setTimeout(()=>h.remove(),6000);
},300);
const nao = document.getElementById("nao");

nao.addEventListener("mouseover", () => {
    nao.style.position = "absolute";
    nao.style.left = Math.random() * 80 + "vw";
    nao.style.top = Math.random() * 80 + "vh";
});
</script>

</body>
</html>
